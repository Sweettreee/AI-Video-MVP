
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  .app{background:#080810;min-height:100vh;font-family:'DM Sans',sans-serif;color:#F0F0FF;position:relative;overflow:hidden;}
  .bloom{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:320px;background:radial-gradient(ellipse at center,rgba(108,99,255,0.12) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;border-bottom:0.5px solid rgba(108,99,255,0.12);}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:17px;}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:#6C63FF;animation:pdot 2.5s ease-in-out infinite;}
  @keyframes pdot{0%,100%{box-shadow:0 0 8px rgba(108,99,255,0.8);}50%{box-shadow:0 0 20px rgba(108,99,255,1),0 0 40px rgba(108,99,255,0.4);}}
  .nav-avatar{width:32px;height:32px;border-radius:50%;background:rgba(108,99,255,0.15);border:0.5px solid rgba(108,99,255,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#B8B0FF;}

  .step-bar{position:relative;z-index:5;display:flex;align-items:center;justify-content:center;padding:20px 0 0;}
  .si{display:flex;flex-direction:column;align-items:center;gap:5px;opacity:0.28;}
  .si.done{opacity:0.7;} .si.active{opacity:1;}
  .sd{width:26px;height:26px;border-radius:50%;border:1px solid rgba(108,99,255,0.18);display:flex;align-items:center;justify-content:center;font-size:10px;color:#3A3A60;background:transparent;}
  .si.done .sd{background:rgba(34,212,160,0.12);border-color:#22D4A0;color:#22D4A0;}
  .si.active .sd{background:rgba(108,99,255,0.18);border-color:#6C63FF;color:#B8B0FF;box-shadow:0 0 10px rgba(108,99,255,0.25);}
  .sl{font-size:9px;color:#3A3A60;white-space:nowrap;}
  .si.done .sl{color:#22D4A0;} .si.active .sl{color:#9090C0;}
  .sline{width:40px;height:0.5px;background:rgba(108,99,255,0.1);margin:0 4px 18px;}

  .page{position:relative;z-index:5;max-width:820px;margin:0 auto;padding:28px 24px 48px;}

  .page-header{text-align:center;margin-bottom:24px;}
  .page-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(108,99,255,0.09);border:0.5px solid rgba(108,99,255,0.22);border-radius:100px;padding:5px 14px;font-size:10px;color:#8880C8;letter-spacing:0.5px;margin-bottom:10px;}
  .badge-dot{width:5px;height:5px;border-radius:50%;background:#6C63FF;animation:blink 1.4s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
  .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px;margin-bottom:4px;}
  .page-title .accent{background:linear-gradient(135deg,#6C63FF,#00E5FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .page-sub{font-size:13px;color:#50508A;}

  /* Overall progress */
  .overall-bar{background:rgba(12,12,22,0.95);border:1px solid rgba(108,99,255,0.18);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
  .overall-label{font-size:12px;color:#7070A0;flex-shrink:0;}
  .prog-track{flex:1;height:4px;background:rgba(108,99,255,0.1);border-radius:100px;overflow:hidden;}
  .prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#6C63FF,#00E5FF);transition:width 0.6s ease;}
  .overall-pct{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;color:#B8B0FF;min-width:40px;text-align:right;flex-shrink:0;}
  .phase-pills{display:flex;gap:8px;}
  .phase-pill{font-size:10.5px;padding:4px 12px;border-radius:100px;font-weight:500;border:0.5px solid;}
  .phase-pill.idle{color:#3A3A68;background:rgba(108,99,255,0.05);border-color:rgba(108,99,255,0.1);}
  .phase-pill.running{color:#6C63FF;background:rgba(108,99,255,0.1);border-color:rgba(108,99,255,0.3);animation:ppulse 1.6s ease-in-out infinite;}
  .phase-pill.done{color:#22D4A0;background:rgba(34,212,160,0.08);border-color:rgba(34,212,160,0.2);}
  .phase-pill.fail{color:#FF4D6D;background:rgba(255,77,109,0.08);border-color:rgba(255,77,109,0.2);}
  @keyframes ppulse{0%,100%{opacity:1;}50%{opacity:0.55;}}

  /* Scene cards */
  .scene-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .sc{background:rgba(12,12,22,0.95);border:1px solid rgba(108,99,255,0.13);border-radius:18px;overflow:hidden;transition:border-color 0.4s;}
  .sc.img-done{border-color:rgba(108,99,255,0.28);}
  .sc.vid-done{border-color:rgba(34,212,160,0.28);}
  .sc.has-fail{border-color:rgba(255,77,109,0.25);}

  /* Thumb area */
  .sc-thumb{height:130px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .sc-thumb-bg{position:absolute;inset:0;}
  .sc-thumb-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:2;}

  /* Image shimmer */
  .shimmer{position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(108,99,255,0.08) 50%,transparent 100%);background-size:200% 100%;animation:shimmer 1.8s infinite;}
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  /* Fake image fill */
  .img-fill{position:absolute;inset:0;opacity:0;transition:opacity 0.6s ease;}
  .img-fill.show{opacity:1;}

  .thumb-status{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:#3A3A6A;z-index:3;font-family:'JetBrains Mono',monospace;}
  .thumb-status.active-txt{color:#8880C8;animation:ppulse 1.4s infinite;}
  .thumb-status.done-txt{color:#22D4A0;}
  .thumb-status.fail-txt{color:#FF4D6D;}

  @keyframes spin{to{transform:rotate(360deg);}}
  .mini-spin{width:16px;height:16px;border:2px solid rgba(108,99,255,0.15);border-top-color:#6C63FF;border-radius:50%;animation:spin 0.9s linear infinite;z-index:3;}
  .vid-spin{width:16px;height:16px;border:2px solid rgba(34,212,160,0.15);border-top-color:#22D4A0;border-radius:50%;animation:spin 0.9s linear infinite;z-index:3;}

  /* Two-row status inside thumb */
  .thumb-two{display:flex;flex-direction:column;align-items:center;gap:6px;z-index:3;}

  /* Stage row inside card body */
  .sc-body{padding:12px 16px 14px;}
  .sc-num{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#2E2E58;margin-bottom:4px;}
  .sc-title{font-size:13px;font-weight:500;color:#B0B0E0;margin-bottom:10px;line-height:1.4;}

  .stage-row{display:flex;gap:8px;}
  .stage{flex:1;border-radius:9px;padding:8px 10px;border:0.5px solid;}

  .stage.idle{background:rgba(20,20,40,0.6);border-color:rgba(108,99,255,0.1);}
  .stage.running{background:rgba(108,99,255,0.07);border-color:rgba(108,99,255,0.25);}
  .stage.done{background:rgba(34,212,160,0.06);border-color:rgba(34,212,160,0.2);}
  .stage.fail{background:rgba(255,77,109,0.06);border-color:rgba(255,77,109,0.2);}

  .stage-label{font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:3px;}
  .stage.idle .stage-label{color:#2A2A52;}
  .stage.running .stage-label{color:#6C63FF;}
  .stage.done .stage-label{color:#22D4A0;}
  .stage.fail .stage-label{color:#FF4D6D;}

  .stage-val{font-size:11px;line-height:1.4;}
  .stage.idle .stage-val{color:#2A2A52;}
  .stage.running .stage-val{color:#8880C8;}
  .stage.done .stage-val{color:#1A9070;}
  .stage.fail .stage-val{color:#CC3050;}

  .retry-btn{width:100%;margin-top:8px;height:30px;border-radius:100px;border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.07);color:#FF4D6D;font-size:11.5px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .retry-btn:hover{background:rgba(255,77,109,0.14);border-color:rgba(255,77,109,0.5);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .a1{animation:fadeUp 0.35s ease both;}
  .a2{animation:fadeUp 0.35s 0.07s ease both;}
  .a3{animation:fadeUp 0.35s 0.14s ease both;}
</style>

<div class="app">
  <div class="bloom"></div>
  <nav class="nav">
    <div class="logo"><div class="logo-dot"></div>FanFrame</div>
    <div class="nav-avatar">N</div>
  </nav>

  <div class="step-bar">
    <div class="si done"><div class="sd">✓</div><span class="sl">Prompt</span></div>
    <div class="sline"></div>
    <div class="si done"><div class="sd">✓</div><span class="sl">Storyboard</span></div>
    <div class="sline"></div>
    <div class="si done"><div class="sd">✓</div><span class="sl">Evaluate</span></div>
    <div class="sline"></div>
    <div class="si active"><div class="sd">4</div><span class="sl">Generating</span></div>
    <div class="sline"></div>
    <div class="si"><div class="sd">5</div><span class="sl">Result</span></div>
  </div>

  <div class="page">
    <div class="page-header a1">
      <div class="page-badge"><div class="badge-dot"></div>Pipeline Running</div>
      <h2 class="page-title">Generating your <span class="accent">scenes.</span></h2>
      <p class="page-sub">Images and video clips are being created in parallel. This may take a few minutes.</p>
    </div>

    <div class="overall-bar a2">
      <span class="overall-label">Overall</span>
      <div class="prog-track"><div class="prog-fill" id="overallFill" style="width:0%"></div></div>
      <span class="overall-pct" id="overallPct">0%</span>
      <div class="phase-pills">
        <span class="phase-pill" id="pill-img">Image</span>
        <span class="phase-pill" id="pill-vid">Video</span>
        <span class="phase-pill" id="pill-merge">Merge</span>
      </div>
    </div>

    <div class="scene-grid a3" id="sceneGrid">
      <!-- Cards injected by JS -->
    </div>
  </div>
</div>

<script>
  const scenes = [
    {num:'01', title:'Idol appears on rooftop', grad:'linear-gradient(135deg,rgba(108,99,255,0.25),rgba(0,229,255,0.12))'},
    {num:'02', title:'Performance begins',      grad:'linear-gradient(135deg,rgba(180,80,255,0.22),rgba(108,99,255,0.12))'},
    {num:'03', title:'Emotional peak',          grad:'linear-gradient(135deg,rgba(0,229,255,0.18),rgba(34,212,160,0.1))'},
    {num:'04', title:'Aerial pull-back',        grad:'linear-gradient(135deg,rgba(255,77,109,0.15),rgba(180,80,255,0.1))'},
  ];

  const grid = document.getElementById('sceneGrid');
  scenes.forEach((s,i)=>{
    grid.innerHTML += `
    <div class="sc" id="sc${i}">
      <div class="sc-thumb">
        <div class="sc-thumb-bg" style="background:${s.grad};"></div>
        <div class="shimmer" id="shim${i}"></div>
        <div class="img-fill" id="imgfill${i}" style="background:${s.grad};filter:brightness(1.4) saturate(1.2);"></div>
        <div class="sc-thumb-overlay" id="ov${i}">
          <div class="mini-spin" id="spin${i}"></div>
          <span class="thumb-status active-txt" id="ts${i}">Generating image…</span>
        </div>
      </div>
      <div class="sc-body">
        <p class="sc-num">Scene ${s.num}</p>
        <p class="sc-title">${s.title}</p>
        <div class="stage-row">
          <div class="stage idle" id="imgstage${i}">
            <p class="stage-label">Image</p>
            <p class="stage-val" id="imgval${i}">Waiting…</p>
          </div>
          <div class="stage idle" id="vidstage${i}">
            <p class="stage-label">Video</p>
            <p class="stage-val" id="vidval${i}">Waiting…</p>
          </div>
        </div>
        <div id="retrywrap${i}"></div>
      </div>
    </div>`;
  });

  // Timeline simulation
  // Each scene: imgStart, imgDone, vidStart, vidDone, fail(true/false for vid)
  const timeline = [
    {imgS:0,  imgD:3000, vidS:3200, vidD:7000, fail:false},
    {imgS:400,imgD:3600, vidS:3800, vidD:7800, fail:false},
    {imgS:800,imgD:4200, vidS:4400, vidD:8400, fail:false},
    {imgS:600,imgD:3800, vidS:4000, vidD:0,    fail:true},
  ];

  let imgDoneCount=0, vidDoneCount=0;

  function setImgRunning(i){
    document.getElementById('imgstage'+i).className='stage running';
    document.getElementById('imgval'+i).textContent='Generating…';
  }
  function setImgDone(i){
    document.getElementById('shim'+i).style.display='none';
    document.getElementById('imgfill'+i).classList.add('show');
    document.getElementById('spin'+i).style.display='none';
    document.getElementById('ts'+i).textContent='Image ready';
    document.getElementById('ts'+i).className='thumb-status done-txt';
    document.getElementById('imgstage'+i).className='stage done';
    document.getElementById('imgval'+i).textContent='Done ✓';
    document.getElementById('sc'+i).classList.add('img-done');
    imgDoneCount++;
    updateOverall();
    // start vid spinner in overlay
    const ov = document.getElementById('ov'+i);
    ov.innerHTML = '<div class="vid-spin"></div><span class="thumb-status active-txt" id="ts'+i+'">Generating clip…</span>';
    document.getElementById('vidstage'+i).className='stage running';
    document.getElementById('vidval'+i).textContent='Generating…';
  }
  function setVidDone(i){
    document.getElementById('ov'+i).innerHTML='<span class="thumb-status done-txt">Clip ready ✓</span>';
    document.getElementById('vidstage'+i).className='stage done';
    document.getElementById('vidval'+i).textContent='Done ✓';
    document.getElementById('sc'+i).className='sc vid-done';
    vidDoneCount++;
    updateOverall();
  }
  function setVidFail(i){
    document.getElementById('ov'+i).innerHTML='<span class="thumb-status fail-txt">Clip failed</span>';
    document.getElementById('vidstage'+i).className='stage fail';
    document.getElementById('vidval'+i).textContent='Failed';
    document.getElementById('sc'+i).classList.add('has-fail');
    document.getElementById('retrywrap'+i).innerHTML='<button class="retry-btn" onclick="retryVid('+i+')">Retry this clip</button>';
    vidDoneCount++;
    updateOverall();
  }
  function retryVid(i){
    document.getElementById('retrywrap'+i).innerHTML='';
    document.getElementById('sc'+i).classList.remove('has-fail');
    document.getElementById('ov'+i).innerHTML='<div class="vid-spin"></div><span class="thumb-status active-txt">Retrying clip…</span>';
    document.getElementById('vidstage'+i).className='stage running';
    document.getElementById('vidval'+i).textContent='Retrying…';
    vidDoneCount--;
    setTimeout(()=>setVidDone(i), 3000);
  }

  function updateOverall(){
    const total = imgDoneCount + vidDoneCount;
    const max = 8;
    const pct = Math.round(total/max*100);
    document.getElementById('overallFill').style.width = pct+'%';
    document.getElementById('overallPct').textContent = pct+'%';
    if(imgDoneCount>=4){
      document.getElementById('pill-img').className='phase-pill done';
      document.getElementById('pill-vid').className='phase-pill running';
    } else {
      document.getElementById('pill-img').className='phase-pill running';
    }
    if(vidDoneCount>=4){
      document.getElementById('pill-vid').className='phase-pill done';
      document.getElementById('pill-merge').className='phase-pill running';
      setTimeout(()=>{
        document.getElementById('pill-merge').className='phase-pill done';
        document.getElementById('overallFill').style.width='100%';
        document.getElementById('overallPct').textContent='100%';
      },1800);
    }
  }

  // Kick off
  document.getElementById('pill-img').className='phase-pill running';
  timeline.forEach((t,i)=>{
    setTimeout(()=>setImgRunning(i), t.imgS);
    setTimeout(()=>setImgDone(i), t.imgD);
    if(t.fail){
      setTimeout(()=>setVidFail(i), t.vidS+2400);
    } else {
      setTimeout(()=>setVidDone(i), t.vidD);
    }
  });
</script>
